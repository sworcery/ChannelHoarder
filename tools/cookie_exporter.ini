[cookie_exporter]

# Firefox profile name or path.
# Leave empty to use the default Firefox profile.
# Examples: "default-release", "Profile 1", or a full path.
profile =

# Comma-separated list of cookie domains to export.
# Include both .youtube.com and .google.com for full YouTube auth.
domains = .youtube.com, .google.com

# ── Delivery Methods ──────────────────────────────────────────────
# Set one or both. If both are set, cookies are delivered via both methods.

# Push cookies directly to ChannelHoarder API (recommended).
# Example: http://192.168.1.10:8587
server_url =

# Write cookies.txt to a file path (e.g. UNC network share).
# The Docker container's /cookies volume should map to this same location.
# output_path = \\SERVER\share\cookies\cookies.txt

# ── Refresh Settings ────────────────────────────────────────────
# URL to open in Firefox before exporting (refreshes the cookies).
# Default: https://www.youtube.com
# refresh_url = https://www.youtube.com

# Seconds to wait for the page to load before closing Firefox.
# Default: 20
# refresh_wait = 20
