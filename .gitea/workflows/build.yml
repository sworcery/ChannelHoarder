name: Local Dev Build

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  REGISTRY: 192.168.1.10:5000
  IMAGE_NAME: channelhoarder

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and run Ruff
        run: pip install ruff && ruff check backend/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push dev image to local registry
        run: |
          docker build -f docker/Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev

      - name: Image tag summary
        run: |
          echo "Pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
          echo "Ready to test on Unraid. Watchtower (if running) will auto-restart the container."
