version: "3.8"

services:
  channelhoarder:
    image: ghcr.io/sworcery/channelhoarder:latest
    # To build locally instead, comment the image line above and uncomment:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: channelhoarder
    ports:
      - "8587:8000"
    volumes:
      - ./config:/config
      - ./downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - LOG_LEVEL=info
      - POT_SERVER_ENABLED=true
      # Optional: Set your YouTube Data API key
      # - YOUTUBE_API_KEY=your_api_key_here
    restart: unless-stopped
