<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Pixel art octopus grabbing play buttons with tentacles -->
  <rect width="64" height="64" rx="32" fill="#0f0f0f"/>

  <!-- Head (big dome) -->
  <rect x="20" y="4" width="4" height="4" fill="#cc0000"/>
  <rect x="24" y="4" width="4" height="4" fill="#ff0000"/>
  <rect x="28" y="4" width="4" height="4" fill="#ff0000"/>
  <rect x="32" y="4" width="4" height="4" fill="#ff0000"/>
  <rect x="36" y="4" width="4" height="4" fill="#ff0000"/>
  <rect x="40" y="4" width="4" height="4" fill="#cc0000"/>
  <rect x="16" y="8" width="4" height="4" fill="#cc0000"/>
  <rect x="20" y="8" width="4" height="4" fill="#ff0000"/>
  <rect x="24" y="8" width="4" height="4" fill="#ff2020"/>
  <rect x="28" y="8" width="4" height="4" fill="#ff2020"/>
  <rect x="32" y="8" width="4" height="4" fill="#ff2020"/>
  <rect x="36" y="8" width="4" height="4" fill="#ff2020"/>
  <rect x="40" y="8" width="4" height="4" fill="#ff0000"/>
  <rect x="44" y="8" width="4" height="4" fill="#cc0000"/>
  <rect x="16" y="12" width="4" height="4" fill="#cc0000"/>
  <rect x="20" y="12" width="4" height="4" fill="#ff2020"/>
  <rect x="24" y="12" width="4" height="4" fill="#ff2020"/>
  <rect x="28" y="12" width="4" height="4" fill="#ff4040"/>
  <rect x="32" y="12" width="4" height="4" fill="#ff4040"/>
  <rect x="36" y="12" width="4" height="4" fill="#ff2020"/>
  <rect x="40" y="12" width="4" height="4" fill="#ff2020"/>
  <rect x="44" y="12" width="4" height="4" fill="#cc0000"/>

  <!-- Eyes -->
  <rect x="22" y="16" width="6" height="4" fill="white"/>
  <rect x="26" y="17" width="2" height="2" fill="#0f0f0f"/>
  <rect x="36" y="16" width="6" height="4" fill="white"/>
  <rect x="40" y="17" width="2" height="2" fill="#0f0f0f"/>

  <!-- Mouth -->
  <rect x="28" y="20" width="8" height="2" fill="#990000"/>

  <!-- Lower head/body -->
  <rect x="16" y="16" width="4" height="4" fill="#cc0000"/>
  <rect x="44" y="16" width="4" height="4" fill="#cc0000"/>
  <rect x="18" y="20" width="4" height="4" fill="#cc0000"/>
  <rect x="22" y="20" width="4" height="4" fill="#ff0000"/>
  <rect x="26" y="20" width="4" height="4" fill="#ff0000"/>
  <rect x="34" y="20" width="4" height="4" fill="#ff0000"/>
  <rect x="38" y="20" width="4" height="4" fill="#ff0000"/>
  <rect x="42" y="20" width="4" height="4" fill="#cc0000"/>

  <!-- Tentacles spreading out holding play buttons -->
  <!-- Left tentacles -->
  <rect x="12" y="24" width="4" height="4" fill="#cc0000"/>
  <rect x="8" y="28" width="4" height="4" fill="#ff0000"/>
  <rect x="4" y="32" width="4" height="4" fill="#cc0000"/>
  <rect x="4" y="36" width="4" height="4" fill="#ff0000"/>

  <rect x="16" y="24" width="4" height="4" fill="#ff0000"/>
  <rect x="12" y="28" width="4" height="4" fill="#cc0000"/>
  <rect x="8" y="36" width="4" height="4" fill="#cc0000"/>
  <rect x="8" y="40" width="4" height="4" fill="#ff0000"/>
  <rect x="12" y="44" width="4" height="4" fill="#cc0000"/>

  <rect x="20" y="24" width="4" height="4" fill="#ff0000"/>
  <rect x="16" y="28" width="4" height="4" fill="#ff0000"/>
  <rect x="16" y="32" width="4" height="4" fill="#cc0000"/>
  <rect x="16" y="36" width="4" height="4" fill="#ff0000"/>
  <rect x="20" y="40" width="4" height="4" fill="#cc0000"/>
  <rect x="20" y="44" width="4" height="4" fill="#ff0000"/>

  <!-- Right tentacles -->
  <rect x="48" y="24" width="4" height="4" fill="#cc0000"/>
  <rect x="52" y="28" width="4" height="4" fill="#ff0000"/>
  <rect x="56" y="32" width="4" height="4" fill="#cc0000"/>
  <rect x="56" y="36" width="4" height="4" fill="#ff0000"/>

  <rect x="44" y="24" width="4" height="4" fill="#ff0000"/>
  <rect x="48" y="28" width="4" height="4" fill="#cc0000"/>
  <rect x="52" y="36" width="4" height="4" fill="#cc0000"/>
  <rect x="52" y="40" width="4" height="4" fill="#ff0000"/>
  <rect x="48" y="44" width="4" height="4" fill="#cc0000"/>

  <rect x="40" y="24" width="4" height="4" fill="#ff0000"/>
  <rect x="44" y="28" width="4" height="4" fill="#ff0000"/>
  <rect x="44" y="32" width="4" height="4" fill="#cc0000"/>
  <rect x="44" y="36" width="4" height="4" fill="#ff0000"/>
  <rect x="40" y="40" width="4" height="4" fill="#cc0000"/>
  <rect x="40" y="44" width="4" height="4" fill="#ff0000"/>

  <!-- Center tentacles -->
  <rect x="24" y="24" width="4" height="4" fill="#ff0000"/>
  <rect x="28" y="24" width="4" height="4" fill="#ff2020"/>
  <rect x="32" y="24" width="4" height="4" fill="#ff2020"/>
  <rect x="36" y="24" width="4" height="4" fill="#ff0000"/>
  <rect x="24" y="28" width="4" height="4" fill="#cc0000"/>
  <rect x="36" y="28" width="4" height="4" fill="#cc0000"/>

  <!-- Play buttons being grabbed by tentacles -->
  <rect x="26" y="28" width="12" height="8" rx="1" fill="#ff0000" stroke="white" stroke-width="1"/>
  <polygon points="29,30 29,34 35,32" fill="white"/>

  <rect x="4" y="40" width="8" height="6" rx="1" fill="#ff0000" opacity="0.8"/>
  <polygon points="6,41 6,44 10,42.5" fill="white" opacity="0.8"/>

  <rect x="52" y="44" width="8" height="6" rx="1" fill="#ff0000" opacity="0.8"/>
  <polygon points="54,45 54,48 58,46.5" fill="white" opacity="0.8"/>

  <rect x="14" y="48" width="10" height="7" rx="1" fill="#cc0000" opacity="0.6"/>
  <polygon points="16,50 16,53 21,51.5" fill="white" opacity="0.6"/>

  <rect x="38" y="48" width="10" height="7" rx="1" fill="#cc0000" opacity="0.6"/>
  <polygon points="40,50 40,53 45,51.5" fill="white" opacity="0.6"/>

  <rect x="24" y="50" width="14" height="10" rx="1" fill="#ff0000" opacity="0.5"/>
  <polygon points="28,52 28,58 34,55" fill="white" opacity="0.5"/>
